# Kerberos client configuration mounted into the Keycloak container.
# The JVM picks this up via -Djava.security.krb5.conf=/etc/krb5.conf.
# Uses Docker service names as hostnames since Keycloak is on the same
# Docker network as the KDC.

# Global defaults applied to all realms unless overridden per-realm.
[libdefaults]
    # The realm to use when none is specified explicitly (e.g. in kinit).
    default_realm = EXAMPLE.COM

    # Do not try to determine the realm from DNS TXT records.
    # We define the realm mapping explicitly in [realms] below.
    dns_lookup_realm = false

    # Do not try to locate the KDC via DNS SRV records (_kerberos._udp.<realm>).
    # We define the KDC address explicitly in [realms] below.
    dns_lookup_kdc = false

    # How long a ticket is valid before it must be renewed or re-issued.
    ticket_lifetime = 24h

    # Maximum total lifetime a ticket can be renewed without re-authenticating.
    renew_lifetime = 7d

    # Allow tickets to be forwarded to a remote service (e.g. for delegation).
    forwardable = true

    # Do not use reverse DNS to canonicalise hostnames when building principal names.
    # Avoids surprises in environments where reverse DNS does not match forward DNS.
    rdns = false

# Per-realm configuration: tells the Kerberos library where to find the KDC
# and admin server for each realm.
[realms]
    EXAMPLE.COM = {
        # Address of the KDC that issues tickets.
        # Uses the Docker service name — reachable within the Docker network.
        kdc = kerberos:88

        # Address of the kadmin daemon for remote principal administration.
        admin_server = kerberos:749
    }

# [domain_realm] maps hostnames to Kerberos realms so the library can determine
# which realm a service belongs to from its hostname alone.
# default_realm already covers this for our setup, but mapping localhost explicitly
# makes the intent clear: the Keycloak service on localhost belongs to EXAMPLE.COM.
#
# [domain_realm]
#     localhost = EXAMPLE.COM
