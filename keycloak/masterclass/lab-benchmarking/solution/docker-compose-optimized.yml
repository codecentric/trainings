name: kc-mc-lab-benchmarking-optimized
services:
  dev_env:
    image: ghcr.io/codecentric/trainings/keycloak-masterclass-vscode:latest
    platform: linux/amd64
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ././workspace:/config/workspace
    ports:
      - 3000:3000
      - 5500:5500
    networks:
      - backend

  keycloak:
    image: docker.io/library/my-own-keycloak
    environment:
      # Keycloak Admin User
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      # Logging, see: https://www.keycloak.org/server/logging
      KC_LOG_LEVEL: INFO

      # Postgres DB Configuration
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres/keycloak
      KC_DB_USERNAME: postgres_user
      KC_DB_PASSWORD: postgres_pass

      # Required when using start --optimized outside of TLS/reverse-proxy setups
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"

    volumes:
      - ./extensions:/opt/keycloak/providers:z

    ports:
      - 127.0.0.1:8080:8080

    networks:
      - backend

    depends_on:
      postgres:
        condition: service_started

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_pass
    networks:
      - backend
    volumes:
      - postgres-data:/var/lib/postgresql

networks:
  backend:

volumes:
  postgres-data:
