name: kc-mc-lab-benchmarking
services:
  dev_env:
    image: ghcr.io/codecentric/trainings/keycloak-masterclass-vscode:latest
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./workspace:/config/workspace
    ports:
      - 3000:3000
      - 5500:5500

    networks:
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.0
    environment:
      # Keycloak Admin User
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Logging, see: https://www.keycloak.org/server/logging
      KC_LOG_LEVEL: INFO

    volumes:
      - ./extensions:/opt/keycloak/providers:z # Custom extensions/providers

    ports:
      - 8080:8080 # HTTP

    networks:
      - backend

    command:
      - "--verbose"
      - "start-dev" # Only for Dev-Environment!

networks:
  backend:
