name: kc-mc-lab-apis
services:
  dev_env:
    image: ghcr.io/codecentric/trainings/keycloak-masterclass-vscode:latest
    platform: linux/amd64
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./workspace:/config/workspace
    ports:
      - 3000:3000

    networks:
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    environment:
      # Keycloak Admin User
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Logging, see: https://www.keycloak.org/server/logging
      KC_LOG_LEVEL: INFO

    volumes:
      - keycloak-data:/opt/keycloak/data:z # Keycloak h2 database, not for production!
      - ../realm-lab.json:/opt/keycloak/data/import/realm-lab.json

    ports:
      - 8080:8080 # HTTP

    networks:
      - backend

    command:
      - "--verbose"
      - "start-dev" # Only for Dev-Environment!
      - "--import-realm"

networks:
  backend:

volumes:
  keycloak-data:
